name: zcash_wallet
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  rust_lib_zcash_wallet:
    path: rust_builder
  flutter_rust_bridge: 2.11.1
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5
  grpc: ^5.1.0
  protobuf: ^6.0.0
  fixnum: ^1.1.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  crypto: ^3.0.7
  flutter_foreground_task: ^9.2.1
  window_manager: ^0.5.1
  flutter_acrylic: ^1.1.4
  # Direct dep so we can call WindowManipulator.* directly on macOS —
  # flutter_acrylic's Window.* wrappers fire-and-forget the underlying
  # WindowManipulator calls on macOS, breaking our await-based setup
  # ordering. Using WindowManipulator directly lets us await the real
  # platform futures. Already pulled in transitively via flutter_acrylic.
  macos_window_utils: ^1.9.1
  # Renders the Figma-exported icon SVGs under `assets/icons/`.
  # Paired with `ColorFilter.mode(color, BlendMode.srcIn)` in
  # `AppIcon` so a single single-fill SVG tints to any theme color
  # without re-exporting.
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Widgetbook for showcasing the design system in isolation.
  # Entry point: `fvm flutter run -t lib/widgetbook.dart`.
  widgetbook: ^3.14.3

dependency_overrides:
  mobile_scanner:
    path: packages/mobile_scanner
  integration_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.13.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  json_serializable: ^6.13.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/illustrations/
    - assets/icons/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
    - family: Geist Mono
      fonts:
        # Used by AppTypography.codeSmall / codeMedium for monospace text
        # (addresses, transaction IDs, mnemonics).
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
    - family: Libre Caslon Text
      fonts:
        # Variable font — weight axis covers the whole range, Flutter picks
        # the nearest instance at paint time. We reference weight 400
        # (Regular) since the design only uses the Display Medium style,
        # which is Regular weight.
        - asset: assets/fonts/LibreCaslonText-Regular.ttf
          weight: 400

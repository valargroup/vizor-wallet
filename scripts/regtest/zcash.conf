regtest=1
i-am-aware-zcashd-will-be-replaced-by-zebrad-and-zallet-in-2025=1
server=1
listen=0
discover=0
dnsseed=0
txindex=1
experimentalfeatures=1
lightwalletd=1
insightexplorer=1
# Allow shielded transactions with unpaid actions into both the mempool
# and mined blocks so regtest funding/send flows behave like a usable wallet network.
txunpaidactionlimit=50
blockunpaidactionlimit=50
rpcuser=zcash
rpcpassword=zcash
rpcconnect=zcashd
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcport=18232
allowdeprecated=z_getnewaddress

# Activate all relevant network upgrades at height 1 so wallet
# consensus parameters and zcashd regtest stay aligned.
nuparams=5ba81b19:1
nuparams=76b809bb:1
nuparams=2bb40e60:1
nuparams=f5b9230b:1
nuparams=e9ff75a6:1
nuparams=c2d6d0b4:1
nuparams=c8e71055:1

blockunpaidactionlimit=0
rpcuser=zcash
rpcpassword=zcash
rpcconnect=zcashd
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcport=18232
allowdeprecated=z_getnewaddress


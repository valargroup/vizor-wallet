[package]
name = "rust_lib_zcash_wallet"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.11.1"

# Zcash core
zcash_primitives = "0.26.4"
zcash_address = "0.10.1"
zcash_keys = { version = "0.12.0", features = ["orchard"] }
zcash_protocol = "0.7.2"
zcash_client_backend = { version = "0.21.2", features = ["orchard", "transparent-inputs", "lightwalletd-tonic", "sync"] }
zcash_client_sqlite = { version = "0.19.5", features = ["orchard", "transparent-inputs", "unstable"] }
# Must match versions used by zcash_client_sqlite to avoid type conflicts
orchard = "0.11"
sapling-crypto = { version = "0.5", default-features = false }

# Proofs
zcash_proofs = "0.26.1"

# Key generation
bip0039 = "0.12"

# Serialization
nonempty = "0.10"

# Security
secrecy = "0.8"

# Random number generation
rand = "0.8"

# Async runtime & gRPC
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
tonic = { version = "0.14", features = ["channel", "tls-webpki-roots", "tls-ring"] }

# SQLite (re-exported by zcash_client_sqlite but needed for Connection type)
rusqlite = "0.37"

# Hex encoding
hex = "0.4"

[dev-dependencies]
tempfile = "3"
hex = "0.4"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }

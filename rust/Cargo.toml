[package]
name = "rust_lib_zcash_wallet"
version = "0.1.0"
edition = "2021"
rust-version = "1.85.1"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
flutter_rust_bridge = "=2.11.1"

# Zcash core
zcash_primitives = "0.27"
zcash_address = "0.11"
zcash_keys = { version = "0.13", features = ["orchard"] }
zcash_protocol = "0.8"
transparent = { package = "zcash_transparent", version = "0.7" }
zcash_script = "0.4.3"
zcash_client_backend = { version = "0.22", features = [
    "orchard",
    "transparent-inputs",
    "lightwalletd-tonic",
    "lightwalletd-tonic-tls-webpki-roots",
    "sync",
    "pczt",
] }
zcash_client_sqlite = { version = "0.20", features = ["orchard", "transparent-inputs", "unstable", "serde"] }
# Voting clients need PIR lookup support and vote-commitment-tree sync.
zcash_voting = { version = "=0.5.10", features = ["client-pir", "client-tree-sync"] }
# Must match versions used by zcash_client_sqlite to avoid type conflicts
orchard = { version = "=0.13.1", features = ["unstable-voting-circuits"] }
sapling-crypto = { version = "0.7", default-features = false, features = ["circuit"] }
uuid = "1.1"
zip32 = "0.2"
# Required by no-op Sapling prover trait impls
jubjub = "0.10"
bls12_381 = "0.8"
rand_core = "0.6"

# Proofs
zcash_proofs = "0.27"

# Key generation
bip0039 = "0.12"

# Serialization
nonempty = "0.11"
prost = "0.14"
incrementalmerkletree = "0.8"

# Security
secrecy = "0.8"
zeroize = "1"
aes = { version = "0.8", features = ["zeroize"] }
aes-gcm = { version = "0.10", features = ["zeroize"] }
base64 = "0.22"
pbkdf2 = "0.12"
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"

# Random number generation
rand = "0.8"

# Async runtime & gRPC
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
tonic = { version = "0.14", features = ["channel", "tls-webpki-roots", "tls-ring"] }
# rustls is in the graph transitively via tonic; make it a direct dep
# so we can explicitly install the ring CryptoProvider in `init_app`.
# Without an explicit provider install, rustls 0.23+ panics the first
# TLS handshake with "no process-level CryptoProvider installed".
rustls = "0.23"

# SQLite (re-exported by zcash_client_sqlite but needed for Connection type)
rusqlite = "0.37"

# Logging (FRB forwards to Dart console via setup_default_user_utils)
log = "0.4"

# Hex encoding
hex = "0.4"

# Keystone hardware wallet
ur = { git = "https://github.com/KeystoneHQ/ur-rs", tag = "0.3.3" }
pczt = { version = "0.6", features = ["orchard", "io-finalizer", "signer", "zcp-builder"] }
ur-registry = { git = "https://github.com/KeystoneHQ/keystone-sdk-rust", package = "ur-registry", default-features = false, features = ["std"] }
serde_json = "1"
url = "2.5.8"

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = { version = "3.7", features = ["OSX_10_15"] }

[dev-dependencies]
tempfile = "3"
hex = "0.4"

# [patch.crates-io]
# zcash_voting = { path = "../../librustvoting/zcash_voting" }

# Flutter debug builds use Cargokit + Cargo's dev profile (`cargo build`
# without `--release`). Keep debug assertions and symbols, but compile the app
# crate and crypto-heavy dependencies with release-like optimization so
# Halo2/Zcash proof generation is usable during local voting development.
[profile.dev]
opt-level = 3

[profile.dev.package."*"]
opt-level = 3

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }

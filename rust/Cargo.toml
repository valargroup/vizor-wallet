[package]
name = "rust_lib_zcash_wallet"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
flutter_rust_bridge = "=2.11.1"

# Zcash core
zcash_primitives = "0.26.4"
zcash_address = "0.10.1"
zcash_keys = { version = "0.12.0", features = ["orchard"] }
zcash_protocol = "0.7.2"
transparent = { package = "zcash_transparent", version = "0.6.3" }
zcash_script = "0.4.3"
zcash_client_backend = { version = "0.21.2", features = [
    "orchard",
    "transparent-inputs",
    "lightwalletd-tonic",
    "lightwalletd-tonic-tls-webpki-roots",
    "sync",
    "pczt",
] }
zcash_client_sqlite = { version = "0.19.5", features = ["orchard", "transparent-inputs", "unstable", "serde"] }
# Must match versions used by zcash_client_sqlite to avoid type conflicts
orchard = "0.11"
sapling-crypto = { version = "0.5", default-features = false }
uuid = "1.1"
zip32 = "0.2"
# Required by no-op Sapling prover trait impls
jubjub = "0.10"
bls12_381 = "0.8"
rand_core = "0.6"

# Proofs
zcash_proofs = "0.26.1"

# Key generation
bip0039 = "0.12"

# Serialization
nonempty = "0.10"

# Security
secrecy = "0.8"

# Random number generation
rand = "0.8"

# Async runtime & gRPC
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
tonic = { version = "0.14", features = ["channel", "tls-webpki-roots", "tls-ring"] }
# rustls is in the graph transitively via tonic; make it a direct dep
# so we can explicitly install the ring CryptoProvider in `init_app`.
# Without an explicit provider install, rustls 0.23+ panics the first
# TLS handshake with "no process-level CryptoProvider installed".
rustls = "0.23"

# SQLite (re-exported by zcash_client_sqlite but needed for Connection type)
rusqlite = "0.37"

# Logging (FRB forwards to Dart console via setup_default_user_utils)
log = "0.4"

# Hex encoding
hex = "0.4"

# Keystone hardware wallet
ur = { git = "https://github.com/KeystoneHQ/ur-rs", tag = "0.3.3" }
pczt = "0.5"
ur-registry = { git = "https://github.com/KeystoneHQ/keystone-sdk-rust", package = "ur-registry", default-features = false, features = ["std"] }
serde_json = "1"

# USB transport is not available on iOS simulator/device (no IOKit /
# no raw USB syscalls); Keystone over USB is desktop+Android only.
# The Dart-side `KeystoneTransport.available()` already excludes USB on
# iOS, so the functions keep their signatures via iOS stubs in
# `wallet/keystone.rs` — only the actual nusb crate is skipped here.
[target.'cfg(not(target_os = "ios"))'.dependencies]
nusb = { version = "0.2", features = ["tokio"] }

[dev-dependencies]
tempfile = "3"
hex = "0.4"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
